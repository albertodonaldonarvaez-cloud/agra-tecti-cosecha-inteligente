name: CI — Validación de Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🔍 TypeScript check
        run: pnpm check
        continue-on-error: true  # No bloquear por ahora (legacy code puede tener warnings)

      - name: 🏗️ Build cliente (Vite)
        run: pnpm build:client

      - name: 🏗️ Build servidor (esbuild)
        run: npx esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist

      - name: ✅ Build exitoso
        run: echo "Build completo exitoso — seguro para mergear"
